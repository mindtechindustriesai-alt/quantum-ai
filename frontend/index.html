<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindTech Quantum AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Exo 2', sans-serif;
            background: #05080F;
            color: #E8EDF5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        
        /* ===== ANIMATED BACKGROUND PARTICLES ===== */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0,180,216,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(138,43,226,0.03) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(0,245,212,0.02) 0%, transparent 40%);
        }
        
        .bg-particles::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(0,180,216,0.15), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(138,43,226,0.12), transparent),
                radial-gradient(2px 2px at 50px 160px, rgba(0,245,212,0.10), transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(0,180,216,0.12), transparent),
                radial-gradient(2px 2px at 130px 80px, rgba(138,43,226,0.08), transparent),
                radial-gradient(2px 2px at 160px 30px, rgba(0,245,212,0.12), transparent);
            background-size: 200px 200px;
            background-repeat: repeat;
            animation: twinkle 8s ease-in-out infinite alternate;
        }
        
        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 620px;
            width: 90%;
            padding: 50px 40px;
            background: rgba(15, 25, 45, 0.35);
            border: 1px solid rgba(0, 180, 216, 0.15);
            border-radius: 28px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        
        .container:hover {
            border-color: rgba(0, 180, 216, 0.3);
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.5),
                0 0 40px rgba(0,180,216,0.05),
                inset 0 1px 0 rgba(255,255,255,0.08);
        }
        
        /* ===== LOGO ===== */
        .logo-wrapper {
            margin-bottom: 20px;
            transform: rotate(-1.5deg);
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1);
            display: inline-block;
        }
        
        .logo-wrapper:hover {
            transform: rotate(0deg) scale(1.02);
        }
        
        .logo-wrapper img {
            width: 120px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(0,180,216,0.15));
            display: block;
            margin: 0 auto;
        }
        
        /* ===== TITLE ===== */
        .title {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #00B4D8, #8A2BE2, #00F5D4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 6s ease-in-out infinite;
            margin: 10px 0 5px;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .subtitle {
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 6px;
            color: rgba(0, 245, 212, 0.6);
            text-transform: uppercase;
            margin-bottom: 20px;
            font-family: 'Exo 2', sans-serif;
        }
        
        /* ===== QUANTUM BADGE ===== */
        .quantum-badge {
            display: inline-block;
            background: rgba(138, 43, 226, 0.12);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 60px;
            padding: 8px 24px;
            font-size: 0.75rem;
            font-weight: 400;
            color: #00F5D4;
            letter-spacing: 1px;
            margin: 15px 0 10px;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            cursor: default;
        }
        
        .quantum-badge:hover {
            background: rgba(138, 43, 226, 0.2);
            border-color: rgba(138, 43, 226, 0.6);
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.1);
        }
        
        .quantum-badge i {
            margin-right: 6px;
        }
        
        /* ===== STATUS ===== */
        .status {
            color: #00FF88;
            font-size: 1rem;
            font-weight: 400;
            margin: 15px 0 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00FF88;
            border-radius: 50%;
            animation: pulseDot 2s ease-in-out infinite;
        }
        
        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
        
        .patent-info {
            font-size: 0.7rem;
            color: rgba(138, 43, 226, 0.7);
            font-weight: 300;
            letter-spacing: 0.5px;
            margin-top: 5px;
        }
        
        /* ===== DIVIDER ===== */
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,180,216,0.3), transparent);
            margin: 20px auto;
        }
        
        /* ===== BUTTONS ===== */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 20px 0 10px;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 60px;
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            cursor: pointer;
            border: none;
            min-width: 140px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00B4D8, #8A2BE2);
            color: white;
            box-shadow: 0 4px 20px rgba(0, 180, 216, 0.2);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(0, 180, 216, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0px);
        }
        
        .btn-secondary {
            background: rgba(0, 180, 216, 0.08);
            border: 1px solid rgba(0, 180, 216, 0.25);
            color: #E8EDF5;
        }
        
        .btn-secondary:hover {
            background: rgba(0, 180, 216, 0.18);
            border-color: rgba(0, 180, 216, 0.5);
            transform: translateY(-3px);
        }
        
        .btn-ghost {
            background: transparent;
            border: 1px solid rgba(138, 154, 176, 0.2);
            color: rgba(138, 154, 176, 0.8);
        }
        
        .btn-ghost:hover {
            border-color: rgba(138, 154, 176, 0.5);
            color: #E8EDF5;
            transform: translateY(-3px);
        }
        
        .btn i {
            font-size: 0.9rem;
        }
        
        /* ===== LOADING SPINNER ===== */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #00B4D8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* ===== TOAST NOTIFICATION ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 180, 216, 0.2);
            border-radius: 16px;
            padding: 14px 28px;
            color: #E8EDF5;
            font-size: 0.85rem;
            z-index: 999;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1);
            pointer-events: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        
        .toast i {
            margin-right: 10px;
            color: #00FF88;
        }
        
        .toast.error i {
            color: #EF476F;
        }
        
        /* ===== LOADING OVERLAY ===== */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5,8,15,0.7);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-overlay .spinner-big {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #00B4D8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        .loading-overlay p {
            font-size: 0.85rem;
            color: rgba(138, 154, 176, 0.8);
        }
        
        /* ===== FOOTER ===== */
        .footer {
            margin-top: 25px;
            font-size: 0.65rem;
            color: rgba(138, 154, 176, 0.5);
            letter-spacing: 1px;
            font-weight: 300;
        }
        
        .footer a {
            color: rgba(0, 180, 216, 0.5);
            text-decoration: none;
            transition: 0.3s;
        }
        
        .footer a:hover {
            color: rgba(0, 180, 216, 0.9);
        }
        
        /* ===== GLASS CORNER ACCENTS ===== */
        .container::before,
        .container::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.15;
            pointer-events: none;
        }
        
        .container::before {
            top: -30px;
            right: -30px;
            background: #8A2BE2;
        }
        
        .container::after {
            bottom: -30px;
            left: -30px;
            background: #00B4D8;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .container { padding: 35px 20px; }
            .title { font-size: 1.8rem; }
            .logo-wrapper img { width: 90px; }
            .quantum-badge { font-size: 0.65rem; padding: 6px 16px; }
            .btn { padding: 10px 20px; font-size: 0.75rem; min-width: 120px; }
            .button-group { gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="bg-particles"></div>
    
    <!-- ===== TOAST NOTIFICATION ===== -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i> <span id="toastMessage">Action completed</span>
    </div>
    
    <div class="container" id="mainContainer">
        <!-- ===== LOADING OVERLAY ===== -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner-big"></div>
            <p>Fetching quantum data...</p>
        </div>
        
        <!-- ===== LOGO (GLASS, SLIGHT TILT) ===== -->
        <div class="logo-wrapper">
            <img src="https://i.postimg.cc/QtyvGF3B/Quantum-AI-image-logo-removebg-preview.png" alt="MindTech Quantum AI">
        </div>
        
        <!-- ===== TITLE ===== -->
        <h1 class="title">Quantum AI</h1>
        <div class="subtitle">MindTech Industries</div>
        
        <!-- ===== QUANTUM BADGE ===== -->
        <div class="quantum-badge" id="quantumBadge">
            <i>⚛️</i> <span id="badgeText">CHSH S=2.76 · 38% Above Classical</span>
        </div>
        
        <!-- ===== STATUS ===== -->
        <div class="status" id="statusDisplay">
            <span class="dot"></span> <span id="statusText">Backend Operational</span>
        </div>
        
        <div class="patent-info" id="patentInfo">
            SA Patent 2026/05142 · IBM Verified
        </div>
        
        <div class="divider"></div>
        
        <!-- ===== BUTTONS ===== -->
        <div class="button-group">
            <button class="btn btn-primary" onclick="fetchQuantumData()">
                <i class="fas fa-sync-alt"></i> Refresh Data
            </button>
            <button class="btn btn-secondary" onclick="handleAction('Documentation')">
                <i class="fas fa-file-alt"></i> Docs
            </button>
            <button class="btn btn-ghost" onclick="handleAction('Quantum Status')">
                <i class="fas fa-atom"></i> Quantum Status
            </button>
        </div>
        
        <div class="button-group" style="margin-top: 6px;">
            <button class="btn btn-secondary" onclick="window.open('https://quantum-ai-z2wx.onrender.com', '_blank')">
                <i class="fas fa-server"></i> API
            </button>
            <button class="btn btn-secondary" onclick="window.open('https://github.com/mindtechindustriesai-alt', '_blank')">
                <i class="fab fa-github"></i> GitHub
            </button>
        </div>
        
        <div class="divider"></div>
        
        <!-- ===== FOOTER ===== -->
        <div class="footer">
            © 2026 <a href="#" onclick="handleAction('MindTech')">MindTech Industries</a> · Quantum. Sovereign. African.
        </div>
    </div>
    
    <script>
        // ===== CONFIGURATION =====
        const API_BASE = 'https://quantum-ai-z2wx.onrender.com';
        
        // ===== TOAST SYSTEM =====
        let toastTimer = null;
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }
        
        // ===== LOADING OVERLAY =====
        function setLoading(active) {
            const overlay = document.getElementById('loadingOverlay');
            if (active) {
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }
        
        // ===== FETCH QUANTUM DATA =====
        async function fetchQuantumData() {
            setLoading(true);
            
            try {
                // Fetch root endpoint
                const rootRes = await fetch(`${API_BASE}/`);
                const rootData = await rootRes.json();
                
                // Fetch quantum status
                const statusRes = await fetch(`${API_BASE}/api/quantum/status`);
                const statusData = await statusRes.json();
                
                // Fetch badge
                const badgeRes = await fetch(`${API_BASE}/api/quantum/badge`);
                const badgeData = await badgeRes.json();
                
                // Fetch patent
                const patentRes = await fetch(`${API_BASE}/api/quantum/patent`);
                const patentData = await patentRes.json();
                
                // Update UI
                updateUI(rootData, statusData, badgeData, patentData);
                
                showToast('✅ Quantum data refreshed successfully');
                
            } catch (error) {
                console.error('Fetch error:', error);
                showToast('❌ Error fetching quantum data. Check backend.', true);
                // Use fallback data
                updateUIWithFallback();
            } finally {
                setLoading(false);
            }
        }
        
        // ===== UPDATE UI =====
        function updateUI(root, status, badge, patent) {
            // Badge
            const badgeText = document.getElementById('badgeText');
            if (badge && badge.badge) {
                badgeText.textContent = badge.badge;
            } else if (status && status.text) {
                badgeText.textContent = status.text;
            } else {
                badgeText.textContent = 'CHSH S=2.76 · 38% Above Classical';
            }
            
            // Status
            const statusText = document.getElementById('statusText');
            if (root && root.status) {
                statusText.textContent = root.status.charAt(0).toUpperCase() + root.status.slice(1);
            } else {
                statusText.textContent = 'Operational';
            }
            
            // Patent
            const patentInfo = document.getElementById('patentInfo');
            if (patent && patent.application) {
                patentInfo.textContent = `${patent.application} · ${patent.status || 'IBM Verified'}`;
            } else if (root && root.patent) {
                patentInfo.textContent = `${root.patent} · IBM Verified`;
            } else {
                patentInfo.textContent = 'SA Patent 2026/05142 · IBM Verified';
            }
            
            // Update badge class for CHSH value
            updateBadgeGlow(status);
        }
        
        // ===== FALLBACK DATA (when backend unreachable) =====
        function updateUIWithFallback() {
            document.getElementById('badgeText').textContent = 'CHSH S=2.76 · 38% Above Classical';
            document.getElementById('statusText').textContent = 'Operational (Cache)';
            document.getElementById('patentInfo').textContent = 'SA Patent 2026/05142 · IBM Verified';
            showToast('⚠️ Using cached data. Backend may be unreachable.', true);
        }
        
        // ===== BADGE GLOW EFFECT =====
        function updateBadgeGlow(statusData) {
            const badge = document.getElementById('quantumBadge');
            if (statusData && statusData.chsh_s) {
                const s = statusData.chsh_s;
                if (s >= 2.7) {
                    badge.style.borderColor = 'rgba(0, 245, 212, 0.6)';
                    badge.style.boxShadow = '0 0 30px rgba(0, 245, 212, 0.2)';
                } else if (s >= 2.5) {
                    badge.style.borderColor = 'rgba(0, 180, 216, 0.5)';
                    badge.style.boxShadow = '0 0 20px rgba(0, 180, 216, 0.15)';
                }
            }
        }
        
        // ===== BUTTON HANDLER =====
        function handleAction(action) {
            console.log(`[MindTech Quantum AI] Action: ${action}`);
            
            const messages = {
                'Documentation': '📄 Opening documentation...',
                'Quantum Status': '⚛️ Fetching quantum status...',
                'GitHub': '🐙 Opening GitHub repository...',
                'MindTech': '🏢 MindTech Industries — Quantum. Sovereign. African.'
            };
            
            const toastMessage = messages[action] || `✅ ${action} triggered`;
            showToast(toastMessage);
            
            // ===== ACTUAL ACTIONS =====
            const actions = {
                'Documentation': () => window.open('https://github.com/mindtechindustriesai-alt', '_blank'),
                'Quantum Status': () => fetchQuantumData(),
                'GitHub': () => window.open('https://github.com/mindtechindustriesai-alt', '_blank'),
                'MindTech': () => window.open('https://mindtechindustriesai-alt.github.io', '_blank')
            };
            
            if (actions[action]) {
                actions[action]();
            }
            
            // Haptic feedback
            if (navigator.vibrate) {
                navigator.vibrate(10);
            }
        }
        
        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'r' || e.key === 'R') fetchQuantumData();
            if (e.key === 'd' || e.key === 'D') handleAction('Documentation');
            if (e.key === 'q' || e.key === 'Q') handleAction('Quantum Status');
            if (e.key === 'g' || e.key === 'G') handleAction('GitHub');
        });
        
        // ===== AUTO-REFRESH ON LOAD =====
        document.addEventListener('DOMContentLoaded', function() {
            // Initial fetch
            setTimeout(fetchQuantumData, 500);
            
            // Auto-refresh every 60 seconds
            setInterval(fetchQuantumData, 60000);
        });
        
        console.log('🚀 MindTech Quantum AI Loaded');
        console.log(`   📡 API: ${API_BASE}`);
        console.log('   📌 Keyboard Shortcuts:');
        console.log('   R → Refresh Data');
        console.log('   D → Documentation');
        console.log('   Q → Quantum Status');
        console.log('   G → GitHub');
        console.log('   ⚛️ CHSH S=2.76 · 38% Above Classical');
    </script>
</body>
</html>
