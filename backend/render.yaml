services:
  - type: web
    name: quantum-ai
    runtime: python
    repo: https://github.com/mindtechindustriesai-alt/quantum-ai
    plan: free
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: CHSH_S
        value: 2.76
